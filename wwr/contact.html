<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Bovandé FLEINDE">
    <!-- Meta Information -->
    <meta name="description"
      content="Contact White Water Rafting Company for reservations, questions, or suggestions. Find our address, phone number, email, and location map.">
    <title>Contact Us | White Water Rafting Company</title>
    <!-- Link to CSS -->
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <!-- COMPANY INFO -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 yopougon Sideci</p>
            <p>Kolob, Beago</p>
            <p>+225 111 2555 369</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM -->
        <section class="contact-grid">

            <!-- GOOGLE MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps?q=Yopougon+Sideci&output=embed"
                  loading="lazy">
                </iframe>
            </div>

            <!-- FORM -->
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <p>Message Purpose</p>
                <label for="general">
                    <input type="radio" id="general" name="purpose" value="general" required>
                    General Inquiry
                </label>

                <label for="reservation">
                    <input type="radio" id="reservation" name="purpose" value="reservation">
                    Reservation Question
                </label>

                <label for="suggestion">
                    <input type="radio" id="suggestion" name="purpose" value="suggestion">
                    Website Suggestion
                </label>

                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <label for="message">Message</label>
                <textarea id="message" name="message"></textarea>

                <label>
                    <input type="checkbox" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch</button>
            </form>

        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Guide">
                <figcaption>John Black – Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Manager">
                <figcaption>Jane Smith – Operations Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support">
                <figcaption>Mike Brown – Customer Support</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Rafting Company | Siaba Bovande Fleinde</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://twitter.com">
                <img src="images/twitter.png" alt="Twitter">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.png" alt="Instagram">
            </a>
        </nav>
    </footer>
</body>

</html>
