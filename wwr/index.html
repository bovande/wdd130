<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>White Water Rafting | Home</title>
<meta name="description"
  content="Experience thrilling white water rafting adventures for all skill levels.">
<link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <h1>WWR Adventures</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <img src="images/hero.jpg" alt="Rafting Adventure">
            <h1>Ride the Rapids</h1>
        </section>

        <section class="newsletter">
            <h2>Join Our Newsletter</h2>
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email">

                <button type="submit">Join the Adventure</button>
            </form>
        </section>

        <section class="cta">
            <h2>Start Your Journey</h2>
            <a href="trips.html" class="btn">View Trips</a>
        </section>

        <section class="grid-content">
            <div>
                <img src="images/rafting1.jpg" alt="">
                <h3>Our Mission</h3>
                <p>We deliver safe and exciting rafting experiences.</p>
            </div>
            <div>
                <img src="images/rafting2.jpg" alt="">
                <h3>Our Offerings</h3>
                <p>Trips for beginners to experts.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Rafting Company | Siaba Bovande Fleinde</p>
    </footer>
